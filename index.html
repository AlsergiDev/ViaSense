<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>GPS Test - Polling</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>#map{height:100vh;}</style>
</head>
<body>
<div id="map"></div>
<script>
    const map = L.map('map').setView([10.1390, -64.6860], 14);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { subdomains: 'abcd' }).addTo(map);
    let marker = null;

    const supabase = window.supabase.createClient(
        'https://zhofrncmtsaaokqickpr.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpob2ZybmNtdHNhYW9rcWlja3ByIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxMTYxMDMsImV4cCI6MjA5MzY5MjEwM30.bFXibmOOH-Up-AUohXFA-5Vh1pbI33VTfTJTZkyWhuo'
    );

    async function actualizar() {
        const { data, error } = await supabase
            .from('ubicaciones')
            .select('lat, lng')
            .order('created_at', { ascending: false })
            .limit(1);
        if (error) {
            console.error(error);
            return;
        }
        if (data && data[0]) {
            const { lat, lng } = data[0];
            if (marker) map.removeLayer(marker);
            marker = L.circleMarker([lat, lng], { radius: 14, color: '#ffaa33', fillColor: '#ff8800', fillOpacity: 0.8 }).addTo(map);
            marker.bindTooltip("📍 UBICACIÓN ACTUAL").openTooltip();
            map.setView([lat, lng], map.getZoom());
            console.log(`Actualizado a: ${lat}, ${lng}`);
        }
    }

    actualizar();
    setInterval(actualizar, 3000); // cada 3 segundos
</script>
</body>
</html>
